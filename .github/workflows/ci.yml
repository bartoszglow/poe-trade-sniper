name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for gitleaks

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the workspace libraries first (shared/server emit dist/, which is
      # gitignored) so typecheck/test in `verify` can resolve @poe-sniper/*.
      - run: pnpm build

      - run: pnpm verify

      - run: pnpm test:e2e

      - run: pnpm audit --audit-level=high

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
